<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Factify</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <path d="m9 12 2 2 4-4"/>
        </svg>
      </div>
      <h1>Factify</h1>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme" title="Toggle light/dark mode">
        <svg class="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
      </button>
    </header>

    <!-- ═══ EMPTY STATE ═══ -->
    <div id="empty-state" class="state" role="status">
      <div class="hint-wrapper">
        <div class="hint-ring">
          <svg class="hint-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/>
          </svg>
        </div>
        <div class="hint-steps">
          <div class="hint-step">
            <span class="hint-step-num">1</span>
            <span>Select</span>
          </div>
          <svg class="hint-step-arrow" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 4l4 4-4 4"/></svg>
          <div class="hint-step">
            <span class="hint-step-num">2</span>
            <span>Right-click</span>
          </div>
          <svg class="hint-step-arrow" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 4l4 4-4 4"/></svg>
          <div class="hint-step">
            <span class="hint-step-num">3</span>
            <span>Check</span>
          </div>
        </div>
        <span class="hint-shortcut">or press <kbd>⌘</kbd><kbd>⇧</kbd><kbd>F</kbd></span>
      </div>
    </div>

    <!-- ═══ LOADING STATE ═══ -->
    <div id="loading-state" class="state" hidden role="status" aria-live="polite" aria-label="Checking fact">
      <div class="loading-progress">
        <div class="loading-progress-fill" id="loading-progress-fill"></div>
      </div>

      <p class="claim-preview" id="loading-claim"></p>

      <div class="loading-steps" role="list">
        <div class="loading-step active" data-step="extracting" role="listitem">
          <div class="step-icon" aria-hidden="true">
            <div class="step-spinner"></div>
            <svg class="step-check" viewBox="0 0 16 16" fill="none"><path d="M3 8.5L6.5 12L13 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div class="step-label">Extracting claims</div>
        </div>
        <div class="step-connector" aria-hidden="true"></div>
        <div class="loading-step" data-step="searching" role="listitem">
          <div class="step-icon" aria-hidden="true">
            <div class="step-spinner"></div>
            <svg class="step-check" viewBox="0 0 16 16" fill="none"><path d="M3 8.5L6.5 12L13 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div class="step-label">Searching sources</div>
          <div class="step-meta" id="step-meta-searching"></div>
        </div>
        <div class="step-connector" aria-hidden="true"></div>
        <div class="loading-step" data-step="analyzing" role="listitem">
          <div class="step-icon" aria-hidden="true">
            <div class="step-spinner"></div>
            <svg class="step-check" viewBox="0 0 16 16" fill="none"><path d="M3 8.5L6.5 12L13 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div class="step-label">Analyzing evidence</div>
          <div class="step-meta" id="step-meta-analyzing"></div>
        </div>
      </div>
    </div>

    <!-- ═══ RESULT STATE ═══ -->
    <div id="result-state" class="state" hidden>
      <div class="original-text-wrapper">
        <blockquote class="original-text truncated" id="original-text"></blockquote>
        <button class="original-text-toggle" id="original-text-toggle" hidden>Show more</button>
      </div>

      <div class="score-hero">
        <div class="donut-wrapper">
          <svg class="donut" viewBox="0 0 80 80" aria-hidden="true">
            <circle class="donut-track" cx="40" cy="40" r="34" />
            <circle class="donut-fill" id="donut-fill" cx="40" cy="40" r="34" />
          </svg>
          <div class="donut-value" aria-label="Score">
            <span id="score-value">0</span><span class="score-max">/100</span>
          </div>
          <span class="donut-label">Truthfulness</span>
        </div>
        <div class="score-summary">
          <div class="verdict-confidence-row">
            <div class="action-verdict" id="action-verdict">
              <span class="action-icon" id="action-icon" aria-hidden="true"></span>
              <span class="action-label" id="action-label"></span>
            </div>
            <span class="confidence-badge" id="confidence-level"></span>
          </div>
          <p class="tldr" id="tldr"></p>
          <div class="explanation-wrapper">
            <p class="explanation-inline truncated" id="explanation"></p>
            <button class="explanation-toggle" id="explanation-toggle" hidden>Read more</button>
          </div>
        </div>
      </div>

      <div class="claim-summary-wrapper" id="claim-summary-wrapper" hidden>
        <div class="claim-summary-bar" id="claim-summary-bar"></div>
        <div class="claim-summary-legend" id="claim-summary-legend"></div>
      </div>

      <div class="collapsible open" id="claims-section">
        <button class="collapsible-toggle" data-target="claims-section" aria-expanded="true">
          <h3>Claims</h3>
          <span class="toggle-count" id="claims-count"></span>
          <span class="toggle-arrow" aria-hidden="true">›</span>
        </button>
        <div class="collapsible-body">
          <ul id="claims-list" role="list"></ul>
        </div>
      </div>

      <div class="collapsible open" id="sources-section">
        <button class="collapsible-toggle" data-target="sources-section" aria-expanded="true">
          <h3>Sources</h3>
          <span class="toggle-count" id="sources-count"></span>
          <span class="toggle-arrow" aria-hidden="true">›</span>
        </button>
        <div class="collapsible-body">
          <div id="sources-list"></div>
        </div>
      </div>

      <p class="checked-at" id="checked-at"></p>
      <button class="check-another" id="check-another">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 1v5h5"/><path d="M3.51 10a6 6 0 104.36-8.78L1 4"/></svg>
        Check another
      </button>
    </div>

    <!-- ═══ ERROR STATE ═══ -->
    <div id="error-state" class="state" hidden role="alert">
      <div class="error-wrapper">
        <div class="error-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </div>
        <p class="error-title">Something went wrong</p>
        <p class="error-text" id="error-text"></p>
        <button class="check-another error-retry" id="error-check-another">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 1v5h5"/><path d="M3.51 10a6 6 0 104.36-8.78L1 4"/></svg>
          Try again
        </button>
      </div>
    </div>
  </div>

  <script src="panel.js"></script>
</body>
</html>
