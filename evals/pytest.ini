[pytest]
asyncio_mode = auto
testpaths = .
pythonpath = ..
python_files = test_*.py
python_classes = Test*
python_functions = test_*
env_files = .env
log_cli_level = WARNING
markers =
    benchmark: benchmark evals using external datasets (PolitiFact, AVeriTeC, etc.)
    live_api: tests that call real LLM or Tavily APIs (no fake API keys injected)
