<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Factify</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Factify</h1>
    </header>

    <div id="empty-state" class="state">
      <p class="hint">Highlight text on any page, right-click, and select <strong>"Fact This"</strong></p>
    </div>

    <div id="loading-state" class="state" hidden>
      <p class="claim-preview" id="loading-claim"></p>

      <div class="loading-steps">
        <div class="loading-step active" data-step="extracting">
          <div class="step-icon">
            <div class="step-spinner"></div>
            <svg class="step-check" viewBox="0 0 16 16" fill="none"><path d="M3 8.5L6.5 12L13 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div class="step-label">Extracting claims</div>
        </div>
        <div class="step-connector"></div>
        <div class="loading-step" data-step="searching">
          <div class="step-icon">
            <div class="step-spinner"></div>
            <svg class="step-check" viewBox="0 0 16 16" fill="none"><path d="M3 8.5L6.5 12L13 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div class="step-label">Searching sources</div>
          <div class="step-meta" id="step-meta-searching"></div>
        </div>
        <div class="step-connector"></div>
        <div class="loading-step" data-step="analyzing">
          <div class="step-icon">
            <div class="step-spinner"></div>
            <svg class="step-check" viewBox="0 0 16 16" fill="none"><path d="M3 8.5L6.5 12L13 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div class="step-label">Analyzing evidence</div>
          <div class="step-meta" id="step-meta-analyzing"></div>
        </div>
      </div>
    </div>

    <div id="result-state" class="state" hidden>
      <!-- Level 1: Glanceable — always visible -->
      <blockquote class="original-text" id="original-text"></blockquote>

      <div class="action-verdict" id="action-verdict">
        <span class="action-icon" id="action-icon"></span>
        <span class="action-label" id="action-label"></span>
      </div>

      <div class="confidence-line" id="confidence-line">
        <span class="confidence-level" id="confidence-level"></span>
        <span class="confidence-reason" id="confidence-reason"></span>
      </div>

      <hr class="details-divider">

      <div class="score-section">
        <div class="donut-wrapper">
          <svg class="donut" viewBox="0 0 80 80">
            <circle class="donut-track" cx="40" cy="40" r="34" />
            <circle class="donut-fill" id="donut-fill" cx="40" cy="40" r="34" />
          </svg>
          <div class="donut-value">
            <span id="score-value">0</span><span class="score-max">/100</span>
          </div>
        </div>
        <p class="tldr" id="tldr"></p>
      </div>

      <!-- Level 2: Expandable details -->
      <div class="collapsible" id="claims-section">
        <button class="collapsible-toggle" data-target="claims-section">
          <h3>Claims</h3>
          <span class="toggle-count" id="claims-count"></span>
          <span class="toggle-arrow">›</span>
        </button>
        <div class="collapsible-body">
          <ul id="claims-list"></ul>
        </div>
      </div>

      <div class="collapsible" id="analysis-section">
        <button class="collapsible-toggle" data-target="analysis-section">
          <h3>Analysis</h3>
          <span class="toggle-arrow">›</span>
        </button>
        <div class="collapsible-body">
          <p id="explanation"></p>
        </div>
      </div>

      <!-- Level 3: Deep dive -->
      <div class="collapsible" id="sources-section">
        <button class="collapsible-toggle" data-target="sources-section">
          <h3>Sources</h3>
          <span class="toggle-count" id="sources-count"></span>
          <span class="toggle-arrow">›</span>
        </button>
        <div class="collapsible-body">
          <div id="sources-list"></div>
        </div>
      </div>

      <p class="checked-at" id="checked-at"></p>
      <button class="check-another" id="check-another">Check another</button>
    </div>

    <div id="error-state" class="state" hidden>
      <p class="error-icon">!</p>
      <p class="error-text" id="error-text"></p>
      <button class="check-another" id="error-check-another">Try again</button>
    </div>
  </div>

  <script src="panel.js"></script>
</body>
</html>
