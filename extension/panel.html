<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Factify</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Factify</h1>
    </header>

    <div id="empty-state" class="state">
      <p class="hint">Highlight text on any page, right-click, and select <strong>"Fact This"</strong></p>
    </div>

    <div id="loading-state" class="state" hidden>
      <div class="spinner"></div>
      <p class="loading-text">Checking claim...</p>
      <p class="claim-preview" id="loading-claim"></p>
    </div>

    <div id="result-state" class="state" hidden>
      <blockquote class="original-text" id="original-text"></blockquote>

      <div class="score-section">
        <div class="donut-wrapper">
          <svg class="donut" viewBox="0 0 80 80">
            <circle class="donut-track" cx="40" cy="40" r="34" />
            <circle class="donut-fill" id="donut-fill" cx="40" cy="40" r="34" />
          </svg>
          <span class="donut-value" id="score-value">0</span>
        </div>
        <span class="verdict-badge" id="verdict-badge"></span>
      </div>

      <div class="claims-section">
        <h3>Claims</h3>
        <ul id="claims-list"></ul>
      </div>

      <div class="explanation-section">
        <h3>Analysis</h3>
        <p id="explanation"></p>
      </div>

      <div class="sources-section">
        <h3>Sources</h3>
        <div id="sources-list"></div>
      </div>

      <button class="check-another" id="check-another">Check another</button>
    </div>

    <div id="error-state" class="state" hidden>
      <p class="error-icon">!</p>
      <p class="error-text" id="error-text"></p>
      <button class="check-another" id="error-check-another">Try again</button>
    </div>
  </div>

  <script src="panel.js"></script>
</body>
</html>
